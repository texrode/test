<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LOREMIPSUM</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="header">
      <img class="headerLogo" src="./public/LoremIpsum.Net.png" alt="Logo" />
      <div class="headerLinks">
        <a class="headerLinks1" href="#">БИЗНЕС</a>
        <a class="headerLinks2" href="#">О НАС</a>
        <a class="headerLinks3" href="#">ЦЕНЫ</a>
        <a class="headerLinks4" href="#">ОФОРМИТЬ ЗАКАЗ</a>
      </div>
    </div>
    <div class="main">
      <img class="mainLogo" src="./public/Text.png" alt="text" />
      <div class="mainBox">
        <h3 class="mainBoxTitle">
          At vero eos et accusamus et iusto odio dignissimos ducimus!
        </h3>
        <ul class="mainBoxList">
          <li>Totam rem aperiam eaque ipsa</li>
          <li>Sit voluptatem accusantium doloremque laudantium</li>
          <li>Sed ut perspiciatis, unde omnis iste natus error</li>
        </ul>
      </div>
      <div class="mainButtons">
        <button class="mainButtons1">ЗАКАЗАТЬ</button>
        <button class="mainButtons2">ПОДРОБНЕЕ</button>
      </div>
    </div>
    <div class="content">
      <div class="contentBox">
        <div class="contentBoxHeader">
          <img
            class="contentBoxHeaderTitle"
            src="./public/order.png"
            alt="orderText"
          />
          <p class="contentBoxHeaderText">
            Перед заполнением формы ознакомьтесь с нашей схемой работы!
          </p>
        </div>
        <img src="./public/Group.png" alt="" />
      </div>
      <form class="contentForm" action="">
        <select class="contentFormSelect"></select>
        <input class="contentFormEmail" type="email" placeholder="Ваш e-mail" />
        <input class="contentFormName" type="text" placeholder="Ваше имя" />
        <input class="contentFormRange" type="range" />
        <button class="contentFormButton">Отправить</button>
      </form>
    </div>
  </body>
</html>
